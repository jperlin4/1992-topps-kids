<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BallparkStuff.com</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      line-height: 1.6;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    header { text-align: center; margin-bottom: 60px; }
    h1 {
      font-size: 3.5em;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 1.3em;
      color: #ccc;
      margin-bottom: 20px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 40px;
      margin-bottom: 80px;
    }
    .feature-card {
      background: #111;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      border: 2px solid transparent;
    }
    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(255,255,255,0.1);
      border-color: #fff;
    }
    .feature-icon {
      font-size: 4em;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    .feature-title {
      font-size: 1.8em;
      margin-bottom: 10px;
    }

    .coming-soon {
      text-align: center;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.5em; }
      .features {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>BallparkStuff</h1>
    <p class="tagline">Baseball cards • Game day collectibles • Random musings</p>
  </header>

  <section class="features">
    <a href="topps-kids.html" class="feature-card">
      <div class="feature-icon">⚾</div>
      <h2 class="feature-title">92 Topps Kids</h2>
      <p>Signed collection of 132 cards from the classic 1992 set.</p>
    </a>

    <a href="lineup-cards.html" class="feature-card">
      <div class="feature-icon">📋</div>
      <h2 class="feature-title">Lineup Cards</h2>
      <p>Dugout cards and batting orders from MLB, MiLB, NCAA, and more.</p>
    </a>
  </section>

  <section class="coming-soon">
    <h3>Coming Soon</h3>
    <p>Game photos • Stats • Musings</p>
  </section>
</body>
</html>
